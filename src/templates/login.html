<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | FranxAgent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
    <style>
        /* Reset styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #5a67d8;
        }

        .error {
            color: #e53e3e;
            margin-top: 12px;
            font-size: 14px;
        }

        .info {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        a {
            color: #667eea;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Make the register link animate properly */
        #registerLink {
            display: inline-block;
        }

        /* Animation overlay */
        .expand-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .expand-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Checkbox container and shake animation */
        .agree-container {
            margin: 15px 0 5px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #444;
        }
        .agree-container input {
            width: 18px;
            height: 18px;
            margin: 0;
            flex-shrink: 0;
        }
        .agree-container label {
            cursor: pointer;
        }
        .shake {
            animation: shake 0.3s ease-in-out 0s 2;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
        .agree-error {
            color: #e53e3e;
            font-size: 0.8rem;
            margin-top: 5px;
            text-align: left;
        }

        /* Loading state for login button */
        button.loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🤖 FranxAgent</h1>
        <input type="password" id="password" autocomplete="current-password">
        
        <!-- Agreement checkbox -->
        <div class="agree-container" id="agreeContainer">
            <input type="checkbox" id="agreeCheckbox">
            <label for="agreeCheckbox" id="agreeLabel"></label>
        </div>
        <div id="agreeError" class="agree-error" style="display: none;"></div>
        
        <button id="loginBtn"></button>
        <div id="errorMsg" class="error"></div>
        <div class="info">
            <a href="/register" id="registerLink"></a>
        </div>
    </div>

    <script>
        // i18n: translation function and loader
        window.i18n = { language: 'en', translations: {} };
        function t(key, params = {}) {
            let text = key.split('.').reduce((o, k) => (o || {})[k], window.i18n.translations) || key;
            Object.entries(params).forEach(([k, v]) => { text = text.replaceAll(`{${k}}`, v); });
            return text;
        }
        async function loadI18n() {
            try {
                const resp = await fetch('/api/i18n');
                const data = await resp.json();
                window.i18n.language = data.language || 'en';
                window.i18n.translations = data.translations || {};
            } catch (e) {
                console.error('Failed to load i18n', e);
            }
        }

        // Apply translations to all static elements
        function applyTranslations() {
            document.title = t('login.title');
            document.getElementById('password').placeholder = t('login.password_placeholder');
            document.getElementById('agreeLabel').innerHTML = t('login.agree', {
                link: `<a href="${t('login.agree_url')}" target="_blank">${t('login.agree_link')}</a>`
            });
            document.getElementById('agreeError').textContent = t('login.agree_error');
            document.getElementById('loginBtn').textContent = t('login.submit');
            document.getElementById('registerLink').textContent = t('login.no_password');
            document.documentElement.lang = window.i18n.language;
        }

        // DOM elements
        const loginBtn = document.getElementById('loginBtn');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const agreeCheckbox = document.getElementById('agreeCheckbox');
        const agreeContainer = document.getElementById('agreeContainer');
        const agreeError = document.getElementById('agreeError');
        const registerLink = document.getElementById('registerLink');

        // Create overlay element
        const overlay = document.createElement('div');
        overlay.className = 'expand-overlay';
        document.body.appendChild(overlay);

        // Fetch RSA public key from server
        async function fetchPublicKey() {
            const resp = await fetch('/api/public-key');
            const data = await resp.json();
            return data.public_key;
        }

        // Validate checkbox before login
        function validateAgreement() {
            if (!agreeCheckbox.checked) {
                // Shake the agreement container and show error
                agreeContainer.classList.add('shake');
                agreeError.style.display = 'block';
                setTimeout(() => {
                    agreeContainer.classList.remove('shake');
                }, 300);
                return false;
            } else {
                agreeError.style.display = 'none';
                return true;
            }
        }

        // Play the expand animation on success
        function playExpandAnimation(callback) {
            const btn = loginBtn;
            const rect = btn.getBoundingClientRect();
            const clone = btn.cloneNode(true);
            clone.style.position = 'fixed';
            clone.style.top = rect.top + 'px';
            clone.style.left = rect.left + 'px';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';
            clone.style.margin = '0';
            clone.style.zIndex = '10000';
            clone.style.transition = 'all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            clone.style.backgroundColor = getComputedStyle(btn).backgroundColor;
            clone.style.borderRadius = getComputedStyle(btn).borderRadius;
            document.body.appendChild(clone);

            // Force reflow
            clone.offsetHeight;
            clone.style.top = '0';
            clone.style.left = '0';
            clone.style.width = '100%';
            clone.style.height = '100%';
            clone.style.borderRadius = '0';
            clone.style.backgroundColor = '#ffffff';

            overlay.classList.add('active');

            // Wait for animation to finish, then execute callback
            setTimeout(() => {
                clone.remove();
                if (callback) callback();
            }, 300);
        }

        // Login: verify first, animate only on success
        async function login() {
            // First validate agreement
            if (!validateAgreement()) {
                return;
            }

            // Check if password has been set (avoid animation if not)
            try {
                const checkResp = await fetch('/api/check-auth');
                const checkData = await checkResp.json();
                if (!checkData.password_set) {
                    // Password not set: shake the register link and show error message
                    if (registerLink) {
                        registerLink.classList.add('shake');
                        setTimeout(() => registerLink.classList.remove('shake'), 300);
                    }
                    errorMsg.textContent = t('login.password_not_set');
                    return; // Do not proceed to login
                }
            } catch (err) {
                // If the check fails, continue anyway (assume password set)
                console.error('Failed to check password status', err);
            }

            const password = passwordInput.value.trim();
            if (!password) {
                errorMsg.textContent = t('login.enter_password');
                return;
            }

            // Disable button to prevent double-click
            loginBtn.classList.add('loading');
            errorMsg.textContent = '';

            // Perform login request first
            try {
                const publicKeyPem = await fetchPublicKey();
                const encrypt = new JSEncrypt();
                encrypt.setKey(publicKeyPem);
                const encrypted = encrypt.encrypt(password);
                if (!encrypted) {
                    throw new Error(t('login.encryption_failed'));
                }

                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: encrypted })
                });
                const result = await resp.json();

                if (resp.ok) {
                    // Store token temporarily (will be consumed by index.html)
                    localStorage.setItem('FranxAgent_temp_token', result.token);
                    // Login succeeded: play animation then redirect
                    playExpandAnimation(() => {
                        window.location.href = '/';
                    });
                } else {
                    // Login failed: show error, no animation
                    errorMsg.textContent = result.error || t('login.login_failed');
                    loginBtn.classList.remove('loading');
                }
            } catch (err) {
                errorMsg.textContent = t('login.network_error');
                console.error(err);
                loginBtn.classList.remove('loading');
            }
        }

        // Event listeners
        loginBtn.addEventListener('click', login);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        // When checkbox changes, hide error if checked
        agreeCheckbox.addEventListener('change', () => {
            if (agreeCheckbox.checked) {
                agreeError.style.display = 'none';
            }
        });

        // Initialize: load i18n first, then apply translations
        (async function init() {
            await loadI18n();
            applyTranslations();
        })();
    </script>
</body>
</html>
